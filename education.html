<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ประวัติการศึกษา</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

body{

background:linear-gradient(135deg,#fffdf2,#fff7d6,#fffdf7);

min-height:100vh;

}

.container{

width:90%;

max-width:1200px;

margin:auto;

padding:60px 0;

}

h1{

text-align:center;

font-size:52px;

color:#b8860b;

margin-bottom:60px;

}

.timeline{

position:relative;

margin:auto;

}

.timeline::before{

content:"";

position:absolute;

left:85px;

top:0;

width:6px;

height:100%;

background:#ffd54f;

border-radius:10px;

}

.item{

display:flex;

align-items:center;

margin-bottom:60px;

position:relative;

}

.logo{

width:170px;

height:170px;

border-radius:50%;

background:white;

display:flex;

align-items:center;

justify-content:center;

box-shadow:0 10px 30px rgba(0,0,0,.15);

z-index:5;

}

.logo img{

width:120px;

height:120px;

object-fit:contain;

}

.card{

margin-left:40px;

background:white;

padding:30px;

border-radius:25px;

box-shadow:0 12px 35px rgba(0,0,0,.12);

flex:1;

border-left:8px solid #f4c542;

transition:.35s;

}

.card:hover{

transform:translateY(-8px);

}

.card h2{

font-size:30px;

font-weight:700;

color:#8d6e00;

margin-bottom:12px;

}

.card p{

font-size:20px;

font-weight:300;

line-height:1.8;

color:#555;

}

.current .logo{

width:220px;

height:220px;

}

.current .logo img{

width:155px;

height:155px;

}

.current .card{

padding:40px;

border-left:10px solid #ffb300;

background:#fff9e6;

}

.current .card h2{

font-size:38px;

}

.current .card p{

font-size:22px;

}

.back{

display:block;

width:230px;

margin:70px auto 0;

text-align:center;

background:#f4c542;

padding:15px;

border-radius:50px;

text-decoration:none;

color:#333;

font-size:20px;

font-weight:600;

transition:.3s;

}

.back:hover{

background:#e0b400;

}

@media(max-width:900px){

.timeline::before{

display:none;

}

.item{

flex-direction:column;

}

.card{

margin:25px 0 0;

}

}

</style>

</head>

<body>

<div class="container">

<h1>📚 ประวัติการศึกษา</h1>

<div class="timeline">

<div class="item">

<div class="logo">

<img src="assets/logosc1.png">

</div>

<div class="card">

<h2>โรงเรียนวัดหนองนกไข่</h2>

<p>ระดับประถมศึกษาปีที่ 1 - 6</p>

</div>

</div>

  <div class="item">

<div class="logo">

<img src="assets/logosc2.png">

</div>

<div class="card">

<h2>โรงเรียนกุศลวิทยา</h2>

<p>ระดับมัธยมศึกษาปีที่ 1 - 3</p>

</div>

</div>

<div class="item current">

<div class="logo">

<img src="assets/logosc3.png">

</div>

<div class="card">

<h2>โรงเรียนกระทุ่มแบน "วิเศษสมุทคุณ"</h2>

<p>ระดับมัธยมศึกษาปีที่ 4 - ปัจจุบัน</p>

<p>แผนการเรียนภาษาไทย - สังคมศึกษา</p>

</div>

</div>

  </div>

<a href="index.html" class="back">
    ← กลับหน้าแรก
</a>

</div>

</body>
</html>
