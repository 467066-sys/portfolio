    <style>

        .showcase {

            margin-top: 80px;

            padding: 40px;

            overflow: hidden;

        }

        .showcase h2 {

            text-align: center;

            font-size: 42px;

            margin-bottom: 30px;

        }

        .slider-container {

            width: 100%;

            overflow: hidden;

        }

        .showcase-slider {

            display: flex;

            gap: 20px;

            width: max-content;

        }

        .showcase-slider img {

            width: 400px;

            height: 250px;

            object-fit: cover;

            border-radius: 25px;

            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);

        }

    </style>

    <script>

        const slider = document.querySelector(".showcase-slider");

        let position = 0;

        function moveSlider() {

            position += 1;

            slider.style.transform = `translateX(-${position}px)`;

            if (position >= slider.scrollWidth / 2) {

                position = 0;

            }

            requestAnimationFrame(moveSlider);

        }

        moveSlider();

    </script>
